name: Hermes (on-demand)

# On-demand @mention ONLY. Trigger on issue_comment — PR-conversation comments AND
# issue comments both arrive as issue_comment. Do NOT add pull_request_review_comment:
# a submitted review fires that event (and review bodies contain "@<slug>"), which
# re-triggers the bot with no human summon (the Claude->Hermes cascade, .github#527).
# The mention substring itself is enforced inside the reusable workflow via
# mention-trigger, so the slug lives in exactly one place (the with: below).
on:
  issue_comment:
    types: [created]

jobs:
  hermes:
    # Only human comment events from trusted commenters; the bot never re-triggers
    # itself. Mirrors claude.yml's author_association guard -- without it, any
    # non-member commenter on this public repo could summon a secrets-bearing,
    # self-hosted-runner run just by typing the mention string. The actual
    # "@<slug>" mention check lives inside the reusable workflow.
    if: |
      github.actor != 's3ntin3l8-hermes[bot]' &&
      contains(fromJSON('["MEMBER", "OWNER", "COLLABORATOR"]'), github.event.comment.author_association)
    permissions:
      contents: write
      pull-requests: write
      issues: write
      checks: write
    uses: s3ntin3l8/.github/.github/workflows/hermes-review.yml@main
    with:
      mention-trigger: s3ntin3l8-hermes # the GitHub App slug
    secrets: inherit # pragma: allowlist secret
