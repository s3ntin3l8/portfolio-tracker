name: "CodeQL"

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    - cron: "37 1 * * 4"

jobs:
  analyze:
    # Code scanning is free on public repos but requires GitHub Advanced Security on
    # private ones. Skip while private; this auto-runs once the repo is made public.
    if: ${{ github.event.repository.private == false }}
    permissions:
      actions: read
      contents: read
      security-events: write
    uses: s3ntin3l8/.github/.github/workflows/codeql.yml@main
    with:
      languages: '"javascript-typescript"'
