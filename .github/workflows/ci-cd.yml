name: CI/CD

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test-node:
    permissions:
      contents: read
    # SMOKE TEST (temporary): pinned to the not-yet-merged sharding/turbo-cache commit
    # on s3ntin3l8/.github#15 instead of @main, to validate test-shards + turbo-cache
    # live before that PR merges. Revert to @main (and drop test-shards/turbo-cache
    # overrides, since turbo-cache now defaults true) once validated.
    uses: s3ntin3l8/.github/.github/workflows/ci-node.yml@2672ba29c921a5f48a7d1147900d1eda0e2d3937
    with:
      node-version: "26"
      # Root scripts fan out across all workspaces (Turbo for build/lint/typecheck,
      # Vitest projects for tests with aggregated coverage).
      typecheck-script: "typecheck"
      test-script: "test:coverage"
      coverage-fail-under: "70"
      test-shards: "4"
      turbo-cache: true
    secrets: inherit

  test-python:
    # The Trade Republic sync's detail extraction lives in vendored Python
    # (services/api/python/tr_export.py); its unit tests run under pytest, which the
    # Node reusable workflow doesn't cover. tr_export imports pytr lazily, so the tests
    # need only pytest (not the full requirements.txt / pytr).
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install test deps
        run: pip install -r services/api/python/requirements-dev.txt
      - name: Run pytest
        run: python -m pytest services/api/python

  build-docker:
    needs: [test-node, test-python]
    # Only build/publish the image when something lands on main. PRs are validated by
    # the cheap test jobs alone; there's no need to run the slow multi-arch Docker
    # build (and nothing to publish) on every PR commit. Policy lives here in the
    # caller, not the shared reusable workflow, so other repos can still build on PRs.
    if: ${{ github.event_name == 'push' }}
    permissions:
      contents: read
      packages: write
      id-token: write
    uses: s3ntin3l8/.github/.github/workflows/docker-publish.yml@main
    with:
      image-name: "s3ntin3l8/${{ github.event.repository.name }}"
      push-edge: ${{ github.event_name == 'push' }}
    secrets: inherit